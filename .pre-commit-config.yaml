repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run python -m ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: uv run python -m ruff format
        language: system
        types: [python]
      - id: typecheck
        name: pyright
        entry: uv run python -m pyright src
        language: system
        pass_filenames: false
      - id: test
        name: pytest
        entry: uv run python -m pytest tests -q
        language: system
        pass_filenames: false
